<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="上海支付与策略运营岗位筛选清单，汇总大厂、支付公司官网与 BOSS 直聘岗位，包含匹配度、岗位摘要和风险提示。">
  <title>支付与策略运营岗位筛选</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">R</div>
        <div>
          <strong>岗位筛选台</strong>
          <span>RECRUITMENT SHORTLIST</span>
        </div>
      </div>

      <nav class="primary-nav" aria-label="主要视图">
        <button type="button" data-view="jobs" class="active" aria-pressed="true">
          <span aria-hidden="true">▤</span><span>岗位清单</span>
        </button>
        <button type="button" data-view="skills" aria-pressed="false">
          <span aria-hidden="true">✓</span><span>提升计划</span>
        </button>
      </nav>

      <section class="side-section job-navigation" aria-labelledby="tier-heading">
        <h2 id="tier-heading">推荐级别</h2>
        <div id="tier-nav" class="side-nav"></div>
      </section>

      <section class="side-section job-navigation" aria-labelledby="direction-heading">
        <h2 id="direction-heading">岗位方向</h2>
        <div id="direction-nav" class="side-nav compact"></div>
      </section>

      <section class="side-section distribution job-navigation" aria-labelledby="distribution-heading">
        <h2 id="distribution-heading">候选分布</h2>
        <div id="tier-bars"></div>
      </section>

      <section class="side-section learning-navigation learning-skill-navigation" aria-labelledby="learning-skill-heading">
        <h2 id="learning-skill-heading">九项技能</h2>
        <div id="learning-skill-nav" class="learning-skill-nav">
          <span class="side-loading">进入提升计划后加载</span>
        </div>
      </section>

      <div class="sidebar-footer">
        <button id="profile-button" class="profile-button" type="button">查看目标画像</button>
        <span id="source-time">读取数据中</span>
      </div>
    </aside>

    <main class="main">
      <header class="page-header">
        <div class="header-copy">
          <p id="page-eyebrow" class="eyebrow">上海硬性 · 大厂/支付官网 + BOSS</p>
          <h1 id="page-title">支付与策略运营岗位筛选</h1>
          <p id="profile-summary" class="subtitle">加载岗位数据中...</p>
        </div>
        <button id="theme-button" class="icon-button" type="button" title="切换明暗主题" aria-label="切换明暗主题">◐</button>
        <div class="stats" aria-label="岗位统计">
          <div class="stat"><span>候选池</span><strong id="pool-stat">--</strong></div>
          <div class="stat"><span>筛后合格</span><strong id="eligible-stat">--</strong></div>
          <div class="stat accent"><span>推荐清单</span><strong id="displayed-stat">--</strong></div>
          <div class="stat"><span>当前显示</span><strong id="visible-stat">--</strong></div>
        </div>
      </header>

      <div class="workspace">
        <section id="jobs-view" class="view-panel">
        <section class="filter-panel" aria-label="岗位筛选器">
          <div class="search-row">
            <label class="search-box" for="search-input">
              <span aria-hidden="true">⌕</span>
              <input id="search-input" type="search" placeholder="搜索岗位、公司、职责或要求" autocomplete="off">
            </label>
            <button id="reset-button" class="secondary-button" type="button">重置</button>
          </div>

          <div class="filters">
            <label>岗位方向
              <select id="direction-select"><option value="all">全部方向</option></select>
            </label>
            <label>经验要求
              <select id="experience-select">
                <option value="all">全部经验</option>
                <option value="经验不限">经验不限</option>
                <option value="1-3年">1-3 年</option>
                <option value="3-5年">3-5 年</option>
                <option value="5-10年">5-10 年</option>
              </select>
            </label>
            <label>最低月薪
              <select id="salary-select">
                <option value="0">不限</option>
                <option value="15">15K+</option>
                <option value="20">20K+</option>
                <option value="25">25K+</option>
                <option value="30">30K+</option>
              </select>
            </label>
            <label>风险偏好
              <select id="risk-select">
                <option value="all">全部岗位</option>
                <option value="direct">仅直接招聘</option>
                <option value="no-english">不要求英语</option>
                <option value="low-risk">直接招聘且不要求英语</option>
              </select>
            </label>
            <label>加分项
              <select id="bonus-select">
                <option value="all">全部岗位</option>
                <option value="payment">支付业务</option>
                <option value="international-payment">国际/跨境支付匹配</option>
                <option value="payment-native">支付公司</option>
                <option value="payment-leader">头部支付机构</option>
                <option value="major">大平台公司</option>
                <option value="both">支付 + 大平台</option>
                <option value="official">公司官网</option>
                <option value="reference">原始标杆</option>
              </select>
            </label>
            <label>排序方式
              <select id="sort-select">
                <option value="score">匹配度优先</option>
                <option value="salary">起薪优先</option>
                <option value="rank">原始推荐顺序</option>
              </select>
            </label>
          </div>

          <div class="filter-footer">
            <div id="tier-segments" class="segments" aria-label="按推荐级别筛选"></div>
            <label class="check-control">
              <input id="saved-only" type="checkbox">
              <span>只看收藏</span>
            </label>
          </div>
        </section>

        <div class="result-head">
          <div>
            <strong id="result-title">推荐岗位</strong>
            <span id="result-caption">正在载入</span>
          </div>
          <span id="active-filters" class="active-filters"></span>
        </div>

        <section id="job-list" class="job-list" aria-live="polite"></section>
        <div id="empty-state" class="empty-state" hidden>
          <strong>没有符合当前条件的岗位</strong>
          <button id="empty-reset" type="button">清除筛选</button>
        </div>
        </section>

        <section id="skills-view" class="view-panel skills-view" hidden>
          <div id="guide-loading" class="guide-loading" role="status">
            <span></span>
            <strong>正在加载能力指南</strong>
          </div>

          <section id="ability-panel" class="learning-panel" hidden>
            <header class="learning-header skill-overview-header">
              <div class="learning-header-copy">
                <p class="eyebrow">基于 <span id="skill-job-count">--</span> 个 A 档岗位</p>
                <h2>九项技能</h2>
                <p>P0 是核心训练题库，P1 是按岗位方向选修的专项。点击卡片或左侧技能名称进入。</p>
              </div>
            </header>
            <div id="skill-overview-groups" class="skill-overview-groups"></div>
          </section>

          <section id="skill-detail-panel" class="learning-panel" hidden>
            <nav class="detail-breadcrumb" aria-label="技能详情导航">
              <button id="back-to-overview" type="button"><span aria-hidden="true">←</span> 九项技能</button>
              <span id="detail-position"></span>
            </nav>
            <div id="skill-detail-container"></div>
            <nav class="detail-pagination" aria-label="上一项或下一项技能">
              <button id="previous-skill" type="button"></button>
              <button id="next-skill" type="button"></button>
            </nav>
          </section>

        </section>
      </div>
    </main>
  </div>

  <dialog id="profile-dialog">
    <div class="dialog-header">
      <div>
        <span>筛选基准</span>
        <h2>目标岗位画像</h2>
      </div>
      <button id="dialog-close" class="icon-button" type="button" aria-label="关闭" title="关闭">×</button>
    </div>
    <p id="dialog-summary"></p>
    <ol id="criteria-list"></ol>
  </dialog>

  <template id="job-template">
    <article class="job-card">
      <div class="job-main">
        <div class="rank-block">
          <span class="rank-number"></span>
          <span class="tier-badge"></span>
        </div>
        <div class="job-copy">
          <div class="title-line">
            <div>
              <h2 class="job-title"></h2>
              <p class="company"></p>
            </div>
            <div class="job-actions">
              <button class="save-button" type="button" aria-label="收藏岗位" title="收藏岗位">☆</button>
              <a class="external-button" target="_blank" rel="noopener noreferrer">BOSS <span aria-hidden="true">↗</span></a>
            </div>
          </div>
          <div class="meta-line"></div>
          <div class="bonus-list"></div>
          <div class="dimension-list"></div>
          <div class="risk-line"></div>
        </div>
        <div class="score-block">
          <strong class="score-value"></strong>
          <span>匹配度</span>
        </div>
      </div>
      <button class="detail-toggle" type="button" aria-expanded="false">
        <span>岗位摘要</span><span class="chevron" aria-hidden="true">⌄</span>
      </button>
      <div class="job-detail" hidden>
        <section>
          <h3>工作重点</h3>
          <ul class="responsibility-list"></ul>
        </section>
        <section>
          <h3>核心要求</h3>
          <p class="requirements"></p>
        </section>
      </div>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
